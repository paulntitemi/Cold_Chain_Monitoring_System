name: coldtrack
description: "ColdTrack — Real-time cold-chain vaccine monitoring for dispatch riders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking + AWS auth
  dio: ^5.4.3+1
  aws_common: ^0.7.2
  aws_signature_v4: ^0.6.2
  amazon_cognito_identity_dart_2: ^3.7.0

  # MQTT (Phase 2 stub)
  mqtt_client: ^10.5.1

  # Maps + location
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Background work
  flutter_background_service: ^5.0.10

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Charts
  fl_chart: ^0.68.0

  # Fonts + env
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - .env
